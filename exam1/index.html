<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>英文翻譯複習 - 精確分類版</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #f0f4ff; margin: 0; padding: 20px; color: #333; }
    .container { max-width: 720px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 24px; }
    h1 { text-align: center; color: #2c5282; font-size: 1.4rem; margin-bottom: 15px; }
    
    .unit-selector { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center; }
    .unit-btn { padding: 8px 15px; border: 2px solid #4299e1; background: white; color: #4299e1; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 0.9rem; }
    .unit-btn.active { background: #4299e1; color: white; }
    .unit-all { border-color: #667eea; color: #667eea; }
    .unit-all.active { background: #667eea; color: white; }

    .progress { text-align: center; margin-bottom: 20px; font-weight: bold; color: #666; font-size: 0.9rem; }
    .chinese { font-size: 1.15rem; margin-bottom: 12px; font-weight: bold; background: #f8fafc; padding: 15px; border-radius: 8px; border-left: 5px solid #4299e1; line-height: 1.5; }
    textarea { width: 100%; min-height: 100px; padding: 12px; font-size: 1.1rem; border: 2px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; outline: none; }
    
    .btn-group { display: flex; gap: 10px; margin-top: 15px; }
    .btn { flex: 1; padding: 12px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; }
    .check-btn { background: #4299e1; color: white; }
    .nav-btn { background: #a0aec0; color: white; }
    .reset-btn { background: #f6ad55; color: white; width: 100%; margin-top: 10px; border-radius: 6px; border:none; padding:10px; font-weight:bold; }
    
    #result { margin-top: 15px; font-weight: bold; min-height: 1.5em; }
    .correct { color: #48bb78; }
    .incorrect { color: #f56565; }
    .blue-answer { color: #2b6cb0; font-weight: bold; margin-top: 10px; padding: 15px; background: #ebf8ff; border-radius: 5px; border-left: 5px solid #2b6cb0; line-height: 1.6; }
  </style>
</head>
<body>

<div class="container">
  <h1>✍️ 英文翻譯單元練習</h1>

  <div class="unit-selector">
    <button class="unit-btn active" onclick="switchUnit('L3')">課本 L3</button>
    <button class="unit-btn" onclick="switchUnit('L4')">課本 L4</button>
    <button class="unit-btn" onclick="switchUnit('R1')">妙妙 R1</button>
    <button class="unit-btn" onclick="switchUnit('R2')">妙妙 R2</button>
    <button class="unit-btn unit-all" onclick="switchUnit('ALL')"> 一起上❤️</button>
  </div>

  <div class="progress">
    <span id="unitTitle">課本 L3</span> | 第 <span id="current">1</span> / <span id="total">0</span> 題
  </div>

  <div id="quizContainer">
    <div id="question" class="chinese"></div>
    <textarea id="input" placeholder="在此輸入翻譯...標點空格不計"></textarea>

    <div class="btn-group">
      <button class="btn nav-btn" id="prevBtn" onclick="prev()">⬅️ 上一題</button>
      <button class="btn check-btn" onclick="check()">🔍 檢查答案</button>
      <button class="btn nav-btn" id="nextBtn" onclick="next()">下一題 ➡️</button>
    </div>
    <button class="reset-btn" onclick="resetUnit()">🔄 重來本單元</button>

    <div id="result"></div>
    <div id="answer"></div>
  </div>
</div>

<script>
const allData = {
  'L3': [
    { zh: "為了要考上理想的大學，高中生在課業與課外活動之間取得平衡是很重要的。", en: "To get admitted to the ideal university, it is crucial that high school students strike a balance between their schoolwork and extracurricular activities." },
    { zh: "你的計畫是否能夠進展順利取決於你願意付出多少努力於其中。", en: "Whether your plan will be on track depends on how much effort you are willing to put in." }
  ],
  'L4': [
    { zh: "那些勇於冒險的觀光客們似乎已經在未經許可的情況下進入了原住民部落的私人領域。", en: "Those adventurous tourists seem to have entered the private areas of the indigenous tribe without permission." },
    { zh: "隨著飛魚季節即將到來，達悟族人遵循傳統準則，以確保當地的物種不會被干擾。", en: "With the flying fish season to come, the Tao people follow traditional guidelines to guarantee that local species will not be disturbed." }
  ],
  'R1': [
    { zh: "位於巴黎市區的羅浮宮是舉世聞名的博物館，也是熱門旅遊景點。", en: "Located in central Paris, the Louvre is a world-famous museum as well as a hot tourist attraction." },
    { zh: "2025年10月，館內收藏的數件皇室珠寶遭竊，引發對博物館安全性的憂慮。", en: "In October 2025, several pieces of royal jewelry from the museum's collection were stolen, raising concerns about museum security." }
  ],
  'R2': [
    { zh: "熊在秋天會大量進食以儲存足夠的脂肪過冬。", en: "In fall, bears eat a lot to store enough fat for the winter." },
    { zh: "如果食物短缺，他們將無法冬眠，並可能在尋找食物時與人類發生衝突。", en: "If there isn't enough food, they won't be able to hibernate and may come into conflict with humans while searching for food." }
  ]
};

let currentUnit = 'L3';
let index = 0;
let userResponses = { 'L3': [], 'L4': [], 'R1': [], 'R2': [], 'ALL': [] };
let combinedData = [];

function superNormalize(s) {
  return s.toLowerCase().replace(/[.,!?;:"']/g, " ").replace(/\s+/g, " ").trim();
}

function switchUnit(unitKey) {
  currentUnit = unitKey;
  index = 0;
  
  document.querySelectorAll('.unit-btn').forEach(btn => {
    btn.classList.remove('active');
    if(unitKey === 'ALL' && btn.classList.contains('unit-all')) btn.classList.add('active');
    else if(btn.innerText.includes(unitKey)) btn.classList.add('active');
  });

  const names = {'L3':'課本 L3', 'L4':'課本 L4', 'R1':'妙妙 R1', 'R2':'妙妙 R2', 'ALL':'全部一起練習'};
  document.getElementById("unitTitle").innerText = names[unitKey];

  if(unitKey === 'ALL') {
    combinedData = [...allData['L3'], ...allData['L4'], ...allData['R1'], ...allData['R2']];
  }
  
  load();
}

function load() {
  const data = currentUnit === 'ALL' ? combinedData : allData[currentUnit];
  if (index >= data.length) {
    document.getElementById("quizContainer").innerHTML = `<h2>🎉 ${document.getElementById("unitTitle").innerText} 完成！</h2><button class='btn check-btn' style='width:100%' onclick='location.reload()'>返回主選單</button>`;
    return;
  }
  document.getElementById("question").innerText = data[index].zh;
  document.getElementById("input").value = userResponses[currentUnit][index] || "";
  document.getElementById("current").innerText = index + 1;
  document.getElementById("total").innerText = data.length;
  document.getElementById("result").innerHTML = "";
  document.getElementById("answer").innerHTML = "";
  document.getElementById("prevBtn").disabled = (index === 0);
}

function check() {
  const data = currentUnit === 'ALL' ? combinedData : allData[currentUnit];
  let userText = document.getElementById("input").value;
  if (!userText.trim()) return;
  userResponses[currentUnit][index] = userText;
  
  if (superNormalize(userText) === superNormalize(data[index].en)) {
    document.getElementById("result").innerHTML = "<span class='correct'>✅ 正確！自動跳下一題...</span>";
    setTimeout(next, 800);
  } else {
    document.getElementById("result").innerHTML = "<span class='incorrect'>答錯了傻逼：</span>";
    document.getElementById("answer").innerHTML = `<div class='blue-answer'>💡 參考答案：<br>${data[index].en}</div>`;
  }
}

function next() {
  const data = currentUnit === 'ALL' ? combinedData : allData[currentUnit];
  userResponses[currentUnit][index] = document.getElementById("input").value;
  if (index < data.length) { index++; load(); }
}

function prev() {
  userResponses[currentUnit][index] = document.getElementById("input").value;
  if (index > 0) { index--; load(); }
}

function resetUnit() {
  if(confirm("確定重來本單元嗎？")) { userResponses[currentUnit] = []; index = 0; load(); }
}

switchUnit('L3');
</script>
</body>
</html>
