<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>英文翻譯複習 - 高中句型練習</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f0f4ff; padding: 20px; margin: 0; }
    .container { max-width: 720px; margin: 0 auto; background: white; border-radius: 12px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #2c5282; margin-bottom: 10px; font-size: 1.5rem; }
    .progress { text-align: center; margin-bottom: 20px; color: #666; font-size: 0.9rem; }
    .chinese { font-size: 1.2rem; margin-bottom: 12px; font-weight: bold; color: #2d3748; line-height: 1.5; }
    textarea { width: 100%; min-height: 110px; padding: 12px; font-size: 1.1rem; border: 2px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; outline: none; }
    
    .btn-group { display: flex; gap: 8px; margin-top: 15px; }
    .btn { flex: 1; padding: 12px 5px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; font-size: 0.95rem; }
    .check-btn { background: #4299e1; color: white; }
    .nav-btn { background: #a0aec0; color: white; }
    .reset-btn { width: 100%; margin-top: 10px; background: #f6ad55; color: white; border: none; border-radius: 6px; padding: 10px; font-weight: bold; }
    .btn:disabled { opacity: 0.5; }

    #result { margin-top: 15px; font-weight: bold; min-height: 1.5em; }
    .correct { color: #48bb78; }
    .incorrect { color: #f56565; }
    .blue-answer { color: #2b6cb0; font-weight: bold; margin-top: 10px; padding: 15px; background: #ebf8ff; border-left: 5px solid #2b6cb0; border-radius: 4px; line-height: 1.6; }
  </style>
</head>
<body>

<div class="container">
  <h1>✍️ 英文翻譯衝刺</h1>
  <div class="progress">第 <span id="current">1</span> / <span id="total">8</span> 題 | 目前得分：<span id="score">0</span></div>

  <div class="card">
    <div id="question" class="chinese">載入中...</div>
    <textarea id="input" placeholder="在此輸入答案...標點與空格不計"></textarea>
    
    <div class="btn-group">
      <button class="btn nav-btn" id="prevBtn" onclick="prev()">⬅️ 上一題</button>
      <button class="btn check-btn" onclick="check()">🔍 檢查答案</button>
      <button class="btn nav-btn" onclick="next()">下一題 ➡️</button>
    </div>
    <button class="reset-btn" onclick="reset()">🔄 全部重來</button>

    <div id="result"></div>
    <div id="answer"></div>
  </div>
</div>

<script>
const data = [
  { zh:"為了要考上理想的大學，高中生在課業與課外活動之間取得平衡是很重要的。", en:"To get admitted to the ideal university, it is crucial that high school students strike a balance between their schoolwork and extracurricular activities." },
  { zh:"你的計畫是否能夠進展順利取決於你願意付出多少努力於其中。", en:"Whether your plan will be on track depends on how much effort you are willing to put in." },
  { zh:"那些勇於冒險的觀光客們似乎已經在未經許可的情況下進入了原住民部落的私人領域。", en:"Those adventurous tourists seem to have entered the private areas of the indigenous tribe without permission." },
  { zh:"隨著飛魚季節即將到來，達悟族人遵循傳統準則，以確保當地的物種不會被干擾。", en:"With the flying fish season to come, the Tao people follow traditional guidelines to guarantee that local species will not be disturbed." },
  { zh:"位於巴黎市區的羅浮宮是舉世聞名的博物館，也是熱門旅遊景點。", en:"Located in central Paris, the Louvre is a world-famous museum as well as a hot tourist attraction." },
  { zh:"2025年10月，館內收藏的數件皇室珠寶遭竊，引發對博物館安全性的憂慮。", en:"In October 2025, several pieces of royal jewelry from the museum's collection were stolen, raising concerns about museum security." },
  { zh:"熊在秋天會大量進食以儲存足夠的脂肪過冬。", en:"In fall, bears eat a lot to store enough fat for the winter." },
  { zh:"如果食物短缺，他們將無法冬眠，並可能在尋找食物時與人類發生衝突。", en:"If there isn't enough food, they won't be able to hibernate and may come into conflict with humans while searching for food." }
];

let index = 0;
let score = 0;
let userResponses = new Array(data.length).fill("");

// 超強格式化：移除標點，並把所有空白(空格、換行)都縮減成單一空格
function superNormalize(s) {
  return s.toLowerCase()
          .replace(/[.,!?;:"']/g, " ") // 所有標點變空格
          .replace(/\s+/g, " ")        // 所有連續空白縮成一個空格
          .trim();                     // 去除首尾空白
}

function load() {
  if (index >= data.length) {
    document.querySelector(".card").innerHTML = "<h2 style='text-align:center;'>🎉 練習完成！</h2><p style='text-align:center;'>得分：" + score + "</p><button class='btn check-btn' style='width:100%' onclick='location.reload()'>重新開始</button>";
    return;
  }
  document.getElementById("question").innerText = data[index].zh;
  document.getElementById("input").value = userResponses[index];
  document.getElementById("current").innerText = index + 1;
  document.getElementById("total").innerText = data.length;
  document.getElementById("score").innerText = score;
  document.getElementById("result").innerHTML = "";
  document.getElementById("answer").innerHTML = "";
  document.getElementById("prevBtn").disabled = (index === 0);
}

function check() {
  let userText = document.getElementById("input").value;
  if (!userText.trim()) { alert("請先輸入答案內容喔！"); return; }
  
  userResponses[index] = userText;
  let user = superNormalize(userText);
  let correct = superNormalize(data[index].en);

  if (user === correct) {
    document.getElementById("result").innerHTML = "<span class='correct'>✅ 正確！(標點與空格已自動忽略)</span>";
    score += 10;
    setTimeout(next, 800);
  } else {
    document.getElementById("result").innerHTML = "<span class='incorrect'>❌ 內容有誤，請參考藍色答案：</span>";
    document.getElementById("answer").innerHTML = "<div class='blue-answer'>💡 參考答案：<br>" + data[index].en + "</div>";
  }
}

function next() {
  userResponses[index] = document.getElementById("input").value;
  if (index < data.length) { index++; load(); }
}

function prev() {
  userResponses[index] = document.getElementById("input").value;
  if (index > 0) { index--; load(); }
}

function reset() {
  if(confirm("確定要重來嗎？")) { index = 0; score = 0; userResponses.fill(""); load(); }
}

load();
</script>
</body>
</html>
