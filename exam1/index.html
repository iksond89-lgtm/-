<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>英文翻譯複習 - 高中句型練習</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f0f4ff; padding: 20px; }
    .container { max-width: 720px; margin: 0 auto; background: white; border-radius: 12px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #2c5282; }
    .progress { text-align: center; margin-bottom: 20px; }
    .chinese { font-size: 1.2rem; margin-bottom: 12px; font-weight: bold; }
    textarea { width: 100%; min-height: 100px; padding: 10px; font-size: 1.1rem; border: 2px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; }
    .btn-group { display: flex; gap: 10px; margin-top: 15px; }
    .btn { flex: 1; padding: 12px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; }
    .check-btn { background: #4299e1; color: white; }
    .nav-btn { background: #a0aec0; color: white; }
    #result { margin-top: 15px; font-weight: bold; }
    .correct { color: #48bb78; }
    .incorrect { color: #f56565; }
    /* 藍色參考答案 */
    .blue-answer { color: #2b6cb0; font-weight: bold; margin-top: 10px; padding: 10px; background: #ebf8ff; border-radius: 5px; line-height: 1.5; }
  </style>
</head>
<body>
<div class="container">
  <h1>✍️ 英文翻譯複習</h1>
  <div class="progress">第 <span id="current">1</span> / <span id="total">8</span> 題 | 得分：<span id="score">0</span></div>
  <div class="card">
    <div id="question" class="chinese"></div>
    <textarea id="input" placeholder="請在此輸入英文翻譯..."></textarea>
    <div class="btn-group">
      <button class="btn nav-btn" onclick="prev()">⬅️ 上一題</button>
      <button class="btn check-btn" onclick="check()">🔍 檢查答案</button>
    </div>
    <div id="result"></div>
    <div id="answer"></div>
  </div>
</div>

<script>
const data = [
  { zh:"為了要考上理想的大學，高中生在課業與課外活動之間取得平衡是很重要的。", en:"To get admitted to the ideal university, it is crucial that high school students strike a balance between their schoolwork and extracurricular activities." },
  { zh:"你的計畫是否能夠進展順利取決於你願意付出多少努力於其中。", en:"Whether your plan will be on track depends on how much effort you are willing to put in." },
  { zh:"那些勇於冒險的觀光客們似乎已經在未經許可的情況下進入了原住民部落的私人領域。", en:"Those adventurous tourists seem to have entered the private areas of the indigenous tribe without permission." },
  { zh:"隨著飛魚季節即將到來，達悟族人遵循傳統準則，以確保當地的物種不會被干擾。", en:"With the flying fish season to come, the Tao people follow traditional guidelines to guarantee that local species will not be disturbed." },
  { zh:"位於巴黎市區的羅浮宮是舉世聞名的博物館，也是熱門旅遊景點。", en:"Located in central Paris, the Louvre is a world-famous museum as well as a hot tourist attraction." },
  { zh:"2025年10月，館內收藏的數件皇室珠寶遭竊，引發對博物館安全性的憂慮。", en:"In October 2025, several pieces of royal jewelry from the museum's collection were stolen, raising concerns about museum security." },
  { zh:"熊在秋天會大量進食以儲存足夠的脂肪過冬。", en:"In fall, bears eat a lot to store enough fat for the winter." },
  { zh:"如果食物短缺，他們將無法冬眠，並可能在尋找食物時與人類發生衝突。", en:"If there isn't enough food, they won't be able to hibernate and may come into conflict with humans while searching for food." }
];

let index = 0;
let score = 0;
let userResponses = new Array(data.length).fill("");

function normalize(s) {
  // 修正重點：將所有標點符號取代為空格，並將多個空格縮減為一個，確保判定更寬鬆
  return s.toLowerCase().replace(/[.,!?]/g, " ").replace(/\s+/g, " ").trim();
}

function load() {
  if (index >= data.length) {
    document.querySelector(".card").innerHTML = "<h2>🎉 恭喜完成！</h2><p>最終得分：" + score + "</p><button class='btn check-btn' onclick='location.reload()'>再練習一次</button>";
    return;
  }
  document.getElementById("question").innerText = data[index].zh;
  document.getElementById("input").value = userResponses[index];
  document.getElementById("current").innerText = index + 1;
  document.getElementById("total").innerText = data.length;
  document.getElementById("score").innerText = score;
  document.getElementById("result").innerHTML = "";
  document.getElementById("answer").innerHTML = "";
}

function check() {
  let userText = document.getElementById("input").value;
  let user = normalize(userText);
  let correct = normalize(data[index].en);

  if (!userText.trim()) { alert("請先輸入答案喔！"); return; }
  userResponses[index] = userText;

  if (user === correct) {
    document.getElementById("result").innerHTML = "<span class='correct'>✅ 完全正確！1秒後自動跳下一題...</span>";
    score += 10;
    setTimeout(next, 1000);
  } else {
    document.getElementById("result").innerHTML = "<span class='incorrect'>❌ 內容有誤，請對照藍色答案修正。</span>";
    document.getElementById("answer").innerHTML = "<div class='blue-answer'>💡 參考答案：<br>" + data[index].en + "</div>";
  }
}

function next() { if (index < data.length) { index++; load(); } }
function prev() { userResponses[index] = document.getElementById("input").value; if (index > 0) { index--; load(); } }

load();
</script>
</body>
</html>
